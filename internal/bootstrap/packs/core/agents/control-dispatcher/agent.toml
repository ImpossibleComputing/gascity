description = "Deterministic compiler-v2 workflow control worker"
sandbox_profile = "//.gc/security/worker-credential-deny.sb"
start_command = "sh -c 'export GC_WORKFLOW_TRACE=\"${GC_WORKFLOW_TRACE:-${GC_CONTROL_DISPATCHER_TRACE_DEFAULT:-${GC_CITY}/.gc/runtime/control-dispatcher-trace.log}}\"; trace_dir=\"${GC_WORKFLOW_TRACE%/*}\"; if [ \"$trace_dir\" = \"$GC_WORKFLOW_TRACE\" ]; then trace_dir=\".\"; elif [ -z \"$trace_dir\" ]; then trace_dir=\"/\"; fi; mkdir -p \"$trace_dir\"; exec \"${GC_BIN:-gc}\" convoy control --serve --follow {{.Agent}}'"
prompt_mode = "none"
process_names = ["gc"]
max_active_sessions = 1

[env]
AMP_API_KEY = ""
ANTHROPIC_API_KEY = ""
ANTHROPIC_AUTH_TOKEN = ""
AWS_ACCESS_KEY_ID = ""
AWS_BEARER_TOKEN_BEDROCK = ""
AWS_CONTAINER_AUTHORIZATION_TOKEN = ""
AWS_SECRET_ACCESS_KEY = ""
AWS_SESSION_TOKEN = ""
AZURE_OPENAI_API_KEY = ""
CEREBRAS_API_KEY = ""
CLAUDE_CODE_OAUTH_TOKEN = ""
COHERE_API_KEY = ""
COPILOT_GITHUB_TOKEN = ""
COPILOT_PROVIDER_API_KEY = ""
CURSOR_API_KEY = ""
DEEPSEEK_API_KEY = ""
FIREWORKS_API_KEY = ""
GEMINI_API_KEY = ""
GH_TOKEN = ""
GITHUB_TOKEN = ""
GOOGLE_API_KEY = ""
GOOGLE_APPLICATION_CREDENTIALS = ""
GOOGLE_GENERATIVE_AI_API_KEY = ""
GROQ_API_KEY = ""
KIMI_API_KEY = ""
KIRO_API_KEY = ""
